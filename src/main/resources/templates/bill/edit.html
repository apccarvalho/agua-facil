<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gerenciar Fatura — ÁguaFácil</title>
    <link rel="stylesheet" th:href="@{/styles.css}" />
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="page-wrapper">
        <div class="page-header">
            <h1>Gerenciar Fatura</h1>
            <p>Registre o pagamento, altere o vencimento ou cancele esta cobrança.</p>
        </div>

        <div class="card card-form">
            <form th:action="@{/bill/edit/{id}(id=${bill.id})}" th:object="${bill}" method="post">
                
                <input type="hidden" th:field="*{id}" />
                <input type="hidden" th:field="*{reading.id}" />

                <div class="alert alert-danger" th:if="${erro}">
                    <span th:text="${erro}"></span>
                </div>

                <h3 class="form-section-title">Resumo da Fatura</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label>Imóvel e Leitura</label>
                        <input type="text" class="form-control" readonly 
                               th:value="'Imóvel #' + *{reading.property.id} + ' (Leitura #' + *{reading.id} + ')'" />
                    </div>

                    <div class="form-group">
                        <label for="mesReferencia">Mês de Referência</label>
                        <input type="text" id="mesReferencia" th:field="*{mesReferencia}" class="form-control" readonly />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="consumo">Consumo Calculado (m&sup3;)</label>
                        <input type="number" id="consumo" th:field="*{consumo}" class="form-control" readonly />
                    </div>

                    <div class="form-group">
                        <label for="valorTotal">Valor Total Calculado (R$)</label>
                        <input type="number" step="0.01" id="valorTotal" th:field="*{valorTotal}" class="form-control" readonly />
                    </div>
                </div>

                <h3 class="form-section-title">Dados de Pagamento</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dataVencimento">Data de Vencimento</label>
                        <input type="date" id="dataVencimento" th:field="*{dataVencimento}" class="form-control" required />
                        <div class="error-msg" th:if="${#fields.hasErrors('dataVencimento')}" th:errors="*{dataVencimento}"></div>
                    </div>

                    <div class="form-group">
                        <label for="dataPagamento">Data de Pagamento</label>
                        <input type="date" id="dataPagamento" th:field="*{dataPagamento}" class="form-control" />
                        <span class="label-hint">Deixe em branco se não estiver paga</span>
                        <div class="error-msg" th:if="${#fields.hasErrors('dataPagamento')}" th:errors="*{dataPagamento}"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="status">Status da Fatura</label>
                    <select id="status" th:field="*{status}" class="form-control" required>
                        <option th:each="st : ${statuses}" 
                                th:value="${st}" 
                                th:text="${st}">
                        </option>
                    </select>
                    <div class="error-msg" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/bill}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar Serviço — ÁguaFácil</title>
    <link rel="stylesheet" th:href="@{/styles.css}" />
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="page-wrapper">
        <div class="page-header">
            <h1>Editar Serviço</h1>
            <p>Atualize o valor, nome ou descrição deste serviço. As alterações valerão apenas para os próximos faturamentos.</p>
        </div>

        <div th:if="${erro}" class="alert alert-danger" style="max-width: 680px;">
            <span th:text="${erro}"></span>
        </div>

        <div class="card card-form">
            <form th:action="@{/service/edit/{id}(id=${service.id})}" th:object="${service}" method="post">
                
                <input type="hidden" th:field="*{id}" />

                <h3 class="form-section-title">Dados do Serviço</h3>

                <div class="form-group">
                    <label for="nome">Nome do Serviço</label>
                    <input type="text" id="nome" th:field="*{nome}" 
                           th:class="'form-control' + (${#fields.hasErrors('nome')} ? ' is-invalid' : '')" 
                           required />
                    <div class="error-msg" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição / Observações</label>
                    <textarea id="descricao" th:field="*{descricao}" class="form-control" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="valor">Valor do Serviço (R$)</label>
                    <input type="number" step="0.01" min="0.00" id="valor" th:field="*{valor}" 
                           th:class="'form-control' + (${#fields.hasErrors('valor')} ? ' is-invalid' : '')" 
                           required />
                    <span class="label-hint">Lembre-se: alterar o valor aqui não afeta faturas já geradas no passado.</span>
                    <div class="error-msg" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/service}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                </div>

            </form>
        </div>
    </div>

</body>
</html>

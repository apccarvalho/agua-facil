<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar Faixa de Tarifa — ÁguaFácil</title>
    <link rel="stylesheet" th:href="@{/styles.css}" />
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="page-wrapper">
        <div class="page-header">
            <h1>Editar Faixa de Tarifa</h1>
            <p>Ajuste os valores ou intervalos de cobrança desta faixa.</p>
        </div>

        <div class="card card-form">
            <form th:action="@{/tariff/edit/{id}(id=${tariffTier.id})}" th:object="${tariffTier}" method="post">
                
                <input type="hidden" th:field="*{id}" />
                
                <h3 class="form-section-title">Dados da Faixa</h3>
                
                <div class="alert alert-danger" th:if="${erroTarifa}">
                    <span th:text="${erroTarifa}"></span>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição da Faixa</label>
                    <input type="text" id="descricao" th:field="*{descricao}" class="form-control" 
                           placeholder="Ex: Residencial - Faixa 1 (0 a 10m³)" required />
                    <div class="error-msg" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="consumoMinimo">Consumo Mínimo (m&sup3;)</label>
                        <input type="number" id="consumoMinimo" th:field="*{consumoMinimo}" class="form-control" 
                               min="0" required />
                        <div class="error-msg" th:if="${#fields.hasErrors('consumoMinimo')}" th:errors="*{consumoMinimo}"></div>
                    </div>

                    <div class="form-group">
                        <label for="consumoMaximo">Consumo Máximo (m&sup3;)</label>
                        <input type="number" id="consumoMaximo" th:field="*{consumoMaximo}" class="form-control" 
                               min="0" required />
                        <div class="error-msg" th:if="${#fields.hasErrors('consumoMaximo')}" th:errors="*{consumoMaximo}"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="valorPorM3">Valor por m&sup3; (R$)</label>
                    <input type="number" id="valorPorM3" th:field="*{valorPorM3}" class="form-control" 
                           step="0.01" min="0" required />
                    <div class="error-msg" th:if="${#fields.hasErrors('valorPorM3')}" th:errors="*{valorPorM3}"></div>
                </div>
                
                <div class="form-group">
			        <label for="categoria">Categoria do Imóvel</label>
			        <select id="categoria" th:field="*{categoria}" class="form-control" required>
			            <option value="" disabled selected>Selecione uma categoria...</option>
			            <option th:each="cat : ${categorias}" 
			                    th:value="${cat}" 
			                    th:text="${cat}"></option>
			        </select>
			    </div>

                <div class="form-actions">
                    <a th:href="@{/tariff}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>

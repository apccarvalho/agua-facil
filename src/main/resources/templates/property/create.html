<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nova Propriedade — ÁguaFácil</title>
    <link rel="stylesheet" th:href="@{/styles.css}" />
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="page-wrapper">
        <div class="page-header">
            <h1>Cadastrar Propriedade</h1>
            <p>Preencha os dados abaixo para registrar um novo imóvel.</p>
        </div>

        <div class="card card-form">
            <form th:action="@{/property/save}" th:object="${property}" method="post">
                
                <h3 class="form-section-title">Dados do Imóvel</h3>
                <div class="form-group">
                    <label for="matricula">Matrícula</label>
                    <input type="text" id="matricula" th:field="*{matricula}" class="form-control" placeholder="Ex: 12345-X" />
                    <div class="error-msg" th:if="${#fields.hasErrors('matricula')}" th:errors="*{matricula}"></div>
                    <div class="error-msg" th:if="${erroMatricula}" th:text="${erroMatricula}"></div>
                </div>

                <div class="form-group">
                    <label for="cliente">Proprietário</label>
				<select id="cliente" th:field="*{cliente}" class="form-control">
				    <option value="">Selecione um cliente...</option>
				    <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.user.nome}"></option>
				</select>
                    <div class="error-msg" th:if="${#fields.hasErrors('cliente')}" th:errors="*{cliente}"></div>
                </div>

                <h3 class="form-section-title">Endereço</h3>
                <div class="form-group">
                    <label for="logradouro">Logradouro</label>
                    <input type="text" id="logradouro" th:field="*{logradouro}" class="form-control" />
                    <div class="error-msg" th:if="${#fields.hasErrors('logradouro')}" th:errors="*{logradouro}"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" th:field="*{numero}" class="form-control" />
                        <div class="error-msg" th:if="${#fields.hasErrors('numero')}" th:errors="*{numero}"></div>
                    </div>
                    <div class="form-group">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" th:field="*{bairro}" class="form-control" />
                        <div class="error-msg" th:if="${#fields.hasErrors('bairro')}" th:errors="*{bairro}"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" th:field="*{cidade}" class="form-control" />
                        <div class="error-msg" th:if="${#fields.hasErrors('cidade')}" th:errors="*{cidade}"></div>
                    </div>
                    <div class="form-group">
                        <label for="uf">UF</label>
                        <input type="text" id="uf" th:field="*{uf}" class="form-control" maxlength="2" />
                        <div class="error-msg" th:if="${#fields.hasErrors('uf')}" th:errors="*{uf}"></div>                       
                    </div>
                </div>

                <div class="form-group">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" th:field="*{cep}" class="form-control" placeholder="00000-000" />
                    <div class="error-msg" th:if="${#fields.hasErrors('cep')}" th:errors="*{cep}"></div>
                </div>

                <div class="form-group">
                    <label for="categoria">Categoria do Imóvel</label>
					<select id="categoria" th:field="*{categoria}" class="form-control">
					    <option th:each="cat : ${categorias}" 
					            th:value="${cat}" 
					            th:text="${cat}"></option>
					</select>
                </div>

                <div class="form-actions">
                    <a th:href="@{/property}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar Propriedade</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar Propriedade — ÁguaFácil</title>
    <link rel="stylesheet" th:href="@{/styles.css}" />
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="page-wrapper">
        <div class="page-header">
            <h1>Editar Propriedade</h1>
            <p th:text="'Editando os dados da matrícula: ' + ${property.matricula}"></p>
        </div>

        <div class="card card-form">
            <form th:action="@{/property/edit/{id}(id=${property.id})}" th:object="${property}" method="post">
                <input type="hidden" th:field="*{id}" />
                
                <h3 class="form-section-title">Dados do Imóvel</h3>
                
                <div class="form-group">
                    <label for="matricula">Matrícula</label>
                    <input type="text" id="matricula" th:field="*{matricula}" class="form-control" readonly />
                </div>

                <div class="form-group">
                    <label for="cliente">Proprietário</label>
					<select id="cliente" th:field="*{cliente}" class="form-control">
					    <option value="">Selecione um cliente...</option>
					    <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.user.nome}"></option>
					</select>
                </div>

                <h3 class="form-section-title">Endereço</h3>
                <div class="form-group">
                    <label for="logradouro">Logradouro</label>
                    <input type="text" id="logradouro" th:field="*{logradouro}" class="form-control" />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" th:field="*{numero}" class="form-control" />
                    </div>
                    <div class="form-group">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" th:field="*{bairro}" class="form-control" />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" th:field="*{cidade}" class="form-control" />
                    </div>
                    <div class="form-group">
                        <label for="uf">UF</label>
                        <input type="text" id="uf" th:field="*{uf}" class="form-control" maxlength="2" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" th:field="*{cep}" class="form-control" />
                </div>

                <div class="form-group">
                    <label for="categoria">Categoria do Imóvel</label>
					<select id="categoria" th:field="*{categoria}" class="form-control">
					    <option th:each="cat : ${categorias}" 
					            th:value="${cat}" 
					            th:text="${cat}"></option>
					</select>
                </div>

                <div class="form-actions">
                    <a th:href="@{/property}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>

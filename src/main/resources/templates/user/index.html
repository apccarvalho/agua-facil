<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Usuários — ÁguaFácil</title>
    <link rel="stylesheet" th:href="@{/styles.css}" />
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="page-wrapper">
        <div class="page-header">
            <h1>Usuários</h1>
            <p>Gerencie os usuários cadastrados no sistema</p>
        </div>

        <div class="card">
            <div class="toolbar">
                <!-- Usando a nova classe toolbar-info -->
                <span class="toolbar-info" th:text="${usersList.size()} + ' usuário(s) cadastrado(s)'"></span>
                
                <a th:href="@{/user/novo}" class="btn btn-primary">
                    + Novo Usuário
                </a>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Perfil</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${usersList.isEmpty()}">
                        <!-- Usando a classe empty-state já existente no CSS -->
                        <td colspan="5" class="empty-state">
                            Nenhum usuário cadastrado.
                        </td>
                    </tr>
                    <tr th:each="user : ${usersList}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.nome}"></td>
                        <td th:text="${user.email}"></td>
                        <td>
                            <span th:if="${user.role.name() == 'CLIENTE'}"  class="badge badge-blue">Cliente</span>
                            <span th:if="${user.role.name() == 'FUNCIONARIO'}" class="badge badge-green">Funcionário</span>
                            <span th:if="${user.role.name() == 'LEITOR'}"  class="badge badge-yellow">Leitor</span>
                        </td>
                        <td>
                            <!-- Container flexível para os botões -->
                            <div class="action-buttons">
                                <a th:href="@{/user/edit/{id}(id=${user.id})}"
                                   class="btn btn-warning">Editar</a>
                                   
                                <form th:action="@{/user/delete/{id}(id=${user.id})}"
                                      method="post">
                                    <button type="submit" class="btn btn-danger"
                                            onclick="return confirm('Confirmar exclusão deste usuário?')">
                                        Excluir
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>

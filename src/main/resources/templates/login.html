<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — ÁguaFácil</title>
    <link rel="stylesheet" th:href="@{/styles.css}" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f1f5f9;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .login-logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .login-title {
            color: #1e3a8a;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .login-subtitle {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .login-form .form-group {
            text-align: left;
            margin-bottom: 1.25rem;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            margin-top: 1rem;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="card login-card">
        <div class="login-logo">💧</div>
        <h1 class="login-title">ÁguaFácil</h1>
        <p class="login-subtitle">Acesse o sistema com suas credenciais</p>

        <form class="login-form" th:action="@{/login}" method="post">
            
            <div th:if="${param.error}" class="alert alert-danger" style="text-align: left;">
                E-mail ou senha inválidos. Tente novamente.
            </div>

            <div th:if="${param.logout}" class="alert alert-success" style="text-align: left;">
                Você saiu do sistema com sucesso.
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" class="form-control" 
                       placeholder="seu@email.com" required autofocus />
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" class="form-control" 
                       placeholder="Sua senha" required />
            </div>

            <button type="submit" class="btn btn-primary btn-login">Entrar</button>
        </form>
    </div>

</body>
</html>
